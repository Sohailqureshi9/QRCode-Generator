<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheen Pro QR Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-bg"></div>

    <main class="app-shell">
        <section class="panel form-panel">
            <div class="panel-head">
                <h1>Sheen Pro QR Generator</h1>
                <button id="themeToggle" class="chip-btn" type="button" aria-label="Toggle theme">Dark mode</button>
            </div>
            <p class="subhead">Create professional QR codes for links, payment numbers, and bank details.</p>

            <label for="mode">QR type</label>
            <select id="mode">
                <option value="text">Text or URL</option>
                <option value="app">Banking app deep link</option>
                <option value="wallet">Wallet payment (Easypaisa/JazzCash)</option>
                <option value="bank">Bank account or IBAN</option>
            </select>

            <div id="groupText" class="field-group active">
                <label for="textInput">Text or URL</label>
                <input type="text" id="textInput" placeholder="https://example.com/pay or any text">
            </div>

            <div id="groupApp" class="field-group">
                <label for="appLink">App deep link</label>
                <input type="text" id="appLink" placeholder="easypaisa://payment or https://your-app-link">
            </div>

            <div id="groupWallet" class="field-group two-col">
                <div>
                    <label for="walletProvider">Provider</label>
                    <select id="walletProvider">
                        <option value="Easypaisa">Easypaisa</option>
                        <option value="JazzCash">JazzCash</option>
                        <option value="SadaPay">SadaPay</option>
                        <option value="NayaPay">NayaPay</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label for="walletNumber">Wallet number</label>
                    <input type="text" id="walletNumber" placeholder="03XXXXXXXXX">
                </div>
                <div>
                    <label for="walletName">Account title (optional)</label>
                    <input type="text" id="walletName" placeholder="Muhammad Ali">
                </div>
                <div>
                    <label for="walletAmount">Amount (optional)</label>
                    <input type="text" id="walletAmount" placeholder="2500">
                </div>
            </div>

            <div id="groupBank" class="field-group two-col">
                <div>
                    <label for="bankName">Bank name (optional)</label>
                    <input type="text" id="bankName" placeholder="HBL / Meezan / UBL">
                </div>
                <div>
                    <label for="iban">IBAN</label>
                    <input type="text" id="iban" placeholder="PK36SCBL0000001123456702">
                </div>
                <div>
                    <label for="accountNumber">Account number</label>
                    <input type="text" id="accountNumber" placeholder="Enter account number if no IBAN">
                </div>
                <div>
                    <label for="beneficiary">Beneficiary name (optional)</label>
                    <input type="text" id="beneficiary" placeholder="Account holder full name">
                </div>
                <div class="full-width">
                    <label for="bankAmount">Amount (optional)</label>
                    <input type="text" id="bankAmount" placeholder="4500">
                </div>
            </div>

            <label for="note">Payment note (optional)</label>
            <input type="text" id="note" placeholder="Invoice 204 / Order 501">

            <div class="two-col settings-grid">
                <div>
                    <label for="qrSize">QR size</label>
                    <select id="qrSize">
                        <option value="260">Small (260)</option>
                        <option value="340" selected>Medium (340)</option>
                        <option value="420">Large (420)</option>
                    </select>
                </div>
                <div>
                    <label for="qrEcc">Error correction</label>
                    <select id="qrEcc">
                        <option value="L">Low</option>
                        <option value="M" selected>Medium</option>
                        <option value="Q">Quartile</option>
                        <option value="H">High</option>
                    </select>
                </div>
            </div>

            <p id="errorText" aria-live="polite"></p>

            <div class="actions">
                <button id="generateBtn" class="btn btn-primary" type="button">Generate QR Code</button>
                <button id="clearBtn" class="btn btn-secondary" type="button">Clear</button>
            </div>
        </section>

        <section class="panel result-panel">
            <h2>Generated QR</h2>
            <div id="imgBox" class="img-box">
                <img src="" alt="Generated QR Code" id="qrCodeImage">
            </div>
            <a id="downloadLink" class="btn btn-download" download="sheen-qr.png">Download PNG</a>
            <button id="copyPayloadBtn" class="btn btn-soft" type="button">Copy Payload</button>
            <button id="copyImageLinkBtn" class="btn btn-soft" type="button">Copy Image Link</button>
            <p id="statusText" aria-live="polite"></p>

            <label for="payloadPreview">Encoded payload preview</label>
            <textarea id="payloadPreview" readonly placeholder="Your QR payload will appear here"></textarea>
        </section>
    </main>
    <script src="app.js" defer></script>
</body>

</html>
