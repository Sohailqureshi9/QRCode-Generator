<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheen QRCode Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <p>Enter your text or URL</p>
        <input type="text" id="qrText" placeholder="Enter text or URL">
        <div id="imgBox">
            <img src="" alt="QR Code" id="qrCodeImage">
        </div>
        <p id="errorText" aria-live="polite"></p>
        <button onclick="generateQRCode()">Generate QR Code</button>
    </div>

    <script>
        const imgBox = document.getElementById('imgBox');
        const qrImage = document.getElementById('qrCodeImage');
        const qrText = document.getElementById('qrText');
        const errorText = document.getElementById('errorText');

        function generateQRCode() {
            const text = qrText.value.trim();

            if (!text) {
                imgBox.style.display = 'none';
                errorText.textContent = 'Please enter text or URL';
                qrText.classList.add('error');
                qrText.focus();
                return;
            }

            errorText.textContent = '';
            qrText.classList.remove('error');

            qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(text);
            imgBox.style.display = 'flex';
        }

        qrImage.addEventListener('load', () => {
            errorText.textContent = '';
        });

        qrImage.addEventListener('error', () => {
            imgBox.style.display = 'none';
            errorText.textContent = 'Failed to generate QR code. Check your internet connection and try again.';
        });

        qrText.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                generateQRCode();
            }
        });
    </script>
</body>

</html>
